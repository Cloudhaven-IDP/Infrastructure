name: Build base images

on:
  schedule:
    - cron: "0 6 * * 5"
  push:
    branches: [main]
    paths:
      - "Dockerfiles/**"
      - ".github/workflows/build-base-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  matrix:
    name: Compute image matrix
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.compute.outputs.images }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Detect changed image dirs
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gha-runner:
              - 'Dockerfiles/gha-runner/**'

      - name: Compute matrix
        id: compute
        run: |
          set -eu
          if [[ "${{ github.event_name }}" == "push" ]]; then
            images='${{ steps.filter.outputs.changes }}'
          else
            images=$(yq -o=json '[.images[].name]' Dockerfiles/images.yaml)
          fi
          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image }}
    needs: matrix
    if: needs.matrix.outputs.images != '[]' && needs.matrix.outputs.images != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.images) }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Read image metadata
        id: meta
        run: |
          set -eu
          entry=$(yq -o=json ".images[] | select(.name == \"${{ matrix.image }}\")" Dockerfiles/images.yaml)
          echo "context=$(yq '.context' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$(yq '.dockerfile' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "registry=$(yq '.registry' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "platforms=$(yq '.platforms | join(",")' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          set -eu
          base="${{ steps.meta.outputs.registry }}/${{ matrix.image }}"
          sha="${{ steps.meta.outputs.sha }}"
          date="${{ steps.meta.outputs.date }}"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            printf 'tags<<EOF\n%s:%s-%s\nEOF\n' "$base" "$sha" "$date" >> "$GITHUB_OUTPUT"
          else
            printf 'tags<<EOF\n%s:%s\nEOF\n' "$base" "$sha" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Dockerfiles/${{ steps.meta.outputs.context }}
          file: Dockerfiles/${{ steps.meta.outputs.dockerfile }}
          platforms: ${{ steps.meta.outputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
