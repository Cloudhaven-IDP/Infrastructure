name: Build base images

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Specific image to build (default: all)"
        required: false
        default: "all"

permissions:
  contents: read
  packages: write

jobs:
  matrix:
    name: Compute image matrix
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.compute.outputs.images }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Compute matrix
        id: compute
        run: |
          set -eu
          if [[ "${{ inputs.image }}" == "all" ]]; then
            images=$(yq -I=0 -o=json '[.images[].name]' Dockerfiles/images.yaml)
          else
            images='["${{ inputs.image }}"]'
          fi
          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.images) }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Read image metadata
        id: meta
        run: |
          set -eu
          entry=$(yq -o=json ".images[] | select(.name == \"${{ matrix.image }}\")" Dockerfiles/images.yaml)
          echo "context=$(yq '.context' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$(yq '.dockerfile' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "registry=$(yq '.registry' <<<"$entry")" >> "$GITHUB_OUTPUT"
          echo "platforms=$(yq '.platforms | join(",")' <<<"$entry")" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Dockerfiles/${{ steps.meta.outputs.context }}
          file: Dockerfiles/${{ steps.meta.outputs.dockerfile }}
          platforms: ${{ steps.meta.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Summary
        run: |
          {
            echo "## Built ${{ matrix.image }}"
            echo
            echo "Tag: \`${{ steps.meta.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}\`"
            echo
            echo "Update \`K8s-Bootstrap/nebulosa/arc/kustomization.yaml\` \`images:\` block \`newTag:\` to \`${{ github.sha }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
